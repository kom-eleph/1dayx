<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>1 day X 管理画面</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      background: #f9fafb;
      color: #111827;
    }
    header {
      padding: 16px;
      background: #111827;
      color: white;
    }
    main {
      padding: 16px;
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .meta {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .message {
      white-space: pre-wrap;
      line-height: 1.7;
    }
    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 8px;
      background: #111827;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>1 day X 管理画面</h1>
  </header>

  <main>
    <h2>問い合わせ一覧</h2>

    <input id="admin-key"
      type="password"
      placeholder="管理キー"
      style="width:100%;max-width:420px;padding:10px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:10px;">

    <br>

  <button onclick="loadInquiries()">問い合わせを再読み込み</button>
  <button onclick="loadReservations()" style="margin-left:8px;">予約を再読み込み</button>

  <section style="margin-top:24px;">
    <h2>問い合わせ一覧</h2>
    <div id="inquiries" style="margin-top:16px;">管理キーを入力して再読み込みしてください。</div>
  </section>

  <section style="margin-top:32px;">
    <h2>予約一覧</h2>
    <div id="reservations" style="margin-top:16px;">管理キーを入力して再読み込みしてください。</div>
  </section>
  </main>

  <script>
    const API_BASE_URL = 'https://reservation.1dayx.jp';

    async function fetchJson(path, options = {}) {
      const adminKey = document.getElementById('admin-key').value.trim();

      const res = await fetch(API_BASE_URL + path, {
        ...options,
        headers: {
          'x-admin-api-key': adminKey,
          ...(options.headers || {}),
        },
      });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || 'APIエラー');
      }

      return data;
    }

    function escHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function loadInquiries() {
      const root = document.getElementById('inquiries');
      root.textContent = '読み込み中...';

      try {
        const data = await fetchJson('/api/admin/inquiries');
        const inquiries = data.inquiries || [];

        if (!inquiries.length) {
          root.textContent = '問い合わせはありません。';
          return;
        }

        root.innerHTML = inquiries.map((inq) => `
          <div class="card">
            <div class="meta">
              #${escHtml(inq.id)} / ${escHtml(inq.status)} / ${escHtml(inq.receivedAt || inq.createdAt)}
            </div>
            <div><strong>${escHtml(inq.name || '未入力')}</strong></div>
            <div class="meta">${escHtml(inq.lineUserId || '')}</div>
            <div class="message">${escHtml(inq.message)}</div>
            ${inq.status === 'open' ? `
              <button style="margin-top:12px;" onclick="closeInquiry(${Number(inq.id)})">
                対応済みにする
              </button>
            ` : ''}
          </div>
        `).join('');
      } catch (e) {
        root.textContent = '読み込みに失敗しました: ' + e.message;
      }
    }

    async function loadReservations() {
      const root = document.getElementById('reservations');
      root.textContent = '読み込み中...';

      try {
        const data = await fetchJson('/api/admin/reservations');
        const reservations = data.reservations || [];

        if (!reservations.length) {
          root.textContent = '予約はありません。';
          return;
        }

        root.innerHTML = reservations.map((r) => `
          <div class="card">
            <div class="meta">
              ${escHtml(r.reservationId)} / ${escHtml(r.status)} / ${escHtml(r.reservedAt)}
            </div>
            <div><strong>${escHtml(r.eventName)}</strong></div>
            <div class="meta">
              ${escHtml(r.datetime)} / ${escHtml(r.location)}
            </div>
            <div>
              ${escHtml(r.name || '未入力')}
            </div>
            <div class="meta">
              ${escHtml(r.lineUserId || '')}
            </div>
          </div>
        `).join('');
      } catch (e) {
        root.textContent = '読み込みに失敗しました: ' + e.message;
      }
    }

    async function closeInquiry(id) {
      if (!confirm(`#${id} を対応済みにしますか？`)) return;

      try {
        await fetchJson(`/api/admin/inquiries/${encodeURIComponent(id)}/close`, {
          method: 'POST',
        });
        await loadInquiries();
      } catch (e) {
        alert('更新に失敗しました: ' + e.message);
      }
    }

  </script>
</body>
</html>
