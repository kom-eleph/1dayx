<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>1 day X 管理画面</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      background: #f9fafb;
      color: #111827;
    }
    header {
      padding: 16px;
      background: #111827;
      color: white;
    }
    main {
      padding: 16px;
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .meta {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .message {
      white-space: pre-wrap;
      line-height: 1.7;
    }
    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 8px;
      background: #111827;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>1 day X 管理画面</h1>
  </header>

  <main>
    <h2>問い合わせ一覧</h2>

    <input id="admin-key"
      type="password"
      placeholder="管理キー"
      style="width:100%;max-width:420px;padding:10px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:10px;">

    <br>

  <button onclick="loadInquiries()">問い合わせを再読み込み</button>
  <button onclick="loadReservations()" style="margin-left:8px;">予約を再読み込み</button>

  <section style="margin-top:24px;">
    <h2>問い合わせ一覧</h2>
    <div id="inquiries" style="margin-top:16px;">管理キーを入力して再読み込みしてください。</div>
  </section>

  <section style="margin-top:32px;">
    <h2>予約一覧</h2>
    <div id="reservations" style="margin-top:16px;">管理キーを入力して再読み込みしてください。</div>
  </section>
  <section style="margin-top:32px;">
    <h2>日程追加</h2>

    <div class="card">
      <div style="display:grid;gap:10px;">
        <input id="sched-id" placeholder="日程ID 例: SCH-016" style="padding:10px;border:1px solid #e5e7eb;border-radius:8px;">

        <select id="sched-event-id" style="padding:10px;border:1px solid #e5e7eb;border-radius:8px;">
          <option value="EVT-A">1 day bar</option>
          <option value="EVT-B">1 day desk</option>
          <option value="EVT-C">1 day topic</option>
        </select>

        <label>
          開催日時
          <input id="sched-starts-at" type="datetime-local" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;">
        </label>

        <label>
          受付開始日時
          <input id="sched-accept-start-at" type="datetime-local" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;">
        </label>

        <label>
          受付終了日時
          <input id="sched-accept-end-at" type="datetime-local" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;">
        </label>

        <input id="sched-capacity" type="number" placeholder="定員上書き（空ならイベント既定値）" style="padding:10px;border:1px solid #e5e7eb;border-radius:8px;">
        <input id="sched-location" placeholder="場所" style="padding:10px;border:1px solid #e5e7eb;border-radius:8px;">
        <textarea id="sched-note" placeholder="備考" style="height:80px;padding:10px;border:1px solid #e5e7eb;border-radius:8px;"></textarea>

        <button onclick="createSchedule()">日程を追加する</button>
      </div>
    </div>
  </section>
  </main>

  <script>
    const API_BASE_URL = 'https://reservation.1dayx.jp';

    async function fetchJson(path, options = {}) {
      const adminKey = document.getElementById('admin-key').value.trim();

      const res = await fetch(API_BASE_URL + path, {
        ...options,
        headers: {
          'x-admin-api-key': adminKey,
          ...(options.headers || {}),
        },
      });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || 'APIエラー');
      }

      return data;
    }

    function escHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function loadInquiries() {
      const root = document.getElementById('inquiries');
      root.textContent = '読み込み中...';

      try {
        const data = await fetchJson('/api/admin/inquiries');
        const inquiries = data.inquiries || [];

        if (!inquiries.length) {
          root.textContent = '問い合わせはありません。';
          return;
        }

        root.innerHTML = inquiries.map((inq) => `
          <div class="card">
            <div class="meta">
              #${escHtml(inq.id)} / ${escHtml(inq.status)} / ${escHtml(inq.receivedAt || inq.createdAt)}
            </div>
            <div><strong>${escHtml(inq.name || '未入力')}</strong></div>
            <div class="meta">${escHtml(inq.lineUserId || '')}</div>
            <div class="message">${escHtml(inq.message)}</div>
            ${inq.status === 'open' ? `
              <button style="margin-top:12px;" onclick="closeInquiry(${Number(inq.id)})">
                対応済みにする
              </button>
            ` : ''}
          </div>
        `).join('');
      } catch (e) {
        root.textContent = '読み込みに失敗しました: ' + e.message;
      }
    }

    async function loadReservations() {
      const root = document.getElementById('reservations');
      root.textContent = '読み込み中...';

      try {
        const data = await fetchJson('/api/admin/reservations');
        const reservations = data.reservations || [];

        if (!reservations.length) {
          root.textContent = '予約はありません。';
          return;
        }

        root.innerHTML = reservations.map((r) => `
          <div class="card">
            <div class="meta">
              ${escHtml(r.reservationId)} / ${escHtml(r.status)} / ${escHtml(r.reservedAt)}
            </div>
            <div><strong>${escHtml(r.eventName)}</strong></div>
            <div class="meta">
              ${escHtml(r.datetime)} / ${escHtml(r.location)}
            </div>
            <div>
              ${escHtml(r.name || '未入力')}
            </div>
            <div class="meta">
              ${escHtml(r.lineUserId || '')}
            </div>

            ${r.status === 'active' ? `
              <button style="margin-top:12px;background:#dc2626;" onclick="cancelReservation('${r.reservationId}')">
                キャンセルする
              </button>
            ` : ''}
          </div>
        `).join('');
      } catch (e) {
        root.textContent = '読み込みに失敗しました: ' + e.message;
      }
    }

    async function closeInquiry(id) {
      if (!confirm(`#${id} を対応済みにしますか？`)) return;

      try {
        await fetchJson(`/api/admin/inquiries/${encodeURIComponent(id)}/close`, {
          method: 'POST',
        });
        await loadInquiries();
      } catch (e) {
        alert('更新に失敗しました: ' + e.message);
      }
    }

    async function cancelReservation(id) {
      if (!confirm(`予約 ${id} をキャンセルしますか？`)) return;

      try {
        await fetchJson(`/api/admin/reservations/${encodeURIComponent(id)}/cancel`, {
          method: 'POST',
        });
        await loadReservations();
      } catch (e) {
        alert('キャンセルに失敗しました: ' + e.message);
      }
    }
    function toIsoStringFromLocalInput(value) {
      if (!value) return null;
      return new Date(value).toISOString();
    }

    async function createSchedule() {
      const payload = {
        id: document.getElementById('sched-id').value.trim(),
        eventId: document.getElementById('sched-event-id').value,
        startsAt: toIsoStringFromLocalInput(document.getElementById('sched-starts-at').value),
        acceptStartAt: toIsoStringFromLocalInput(document.getElementById('sched-accept-start-at').value),
        acceptEndAt: toIsoStringFromLocalInput(document.getElementById('sched-accept-end-at').value),
        capacityOverride: document.getElementById('sched-capacity').value,
        location: document.getElementById('sched-location').value.trim(),
        note: document.getElementById('sched-note').value.trim(),
      };

      if (!payload.id || !payload.eventId || !payload.startsAt) {
        alert('日程ID、イベント、開催日時は必須です');
        return;
      }

      try {
        await fetchJson('/api/admin/schedules', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload),
        });

        alert('日程を追加しました');

        document.getElementById('sched-id').value = '';
        document.getElementById('sched-starts-at').value = '';
        document.getElementById('sched-accept-start-at').value = '';
        document.getElementById('sched-accept-end-at').value = '';
        document.getElementById('sched-capacity').value = '';
        document.getElementById('sched-location').value = '';
        document.getElementById('sched-note').value = '';
      } catch (e) {
        alert('日程追加に失敗しました: ' + e.message);
      }
    }
  </script>
</body>
</html>
