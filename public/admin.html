<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>1 day X 管理画面</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f6f9;--surface:#fff;--border:#e2e8f0;--border-mid:#cbd5e1;
      --text:#0f172a;--muted:#64748b;--dim:#94a3b8;
      --accent:#0ea5e9;--accent-light:#e0f2fe;
      --danger:#ef4444;--danger-light:#fef2f2;
      --success:#22c55e;--success-light:#f0fdf4;
      --warning:#f59e0b;--warning-light:#fffbeb;
      --header-h:56px;--tab-bar-h:48px;--key-bar-h:52px;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
    header{position:sticky;top:0;z-index:200;height:var(--header-h);background:#0f172a;color:#fff;display:flex;align-items:center;gap:12px;padding:0 20px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
    header h1{font-size:16px;font-weight:600;letter-spacing:.02em}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);margin-left:auto;box-shadow:0 0 0 2px rgba(34,197,94,.3)}
    .key-bar{position:sticky;top:var(--header-h);z-index:190;height:var(--key-bar-h);background:#1e293b;display:flex;align-items:center;gap:10px;padding:0 16px}
    .key-bar label{font-size:11px;color:#94a3b8;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase}
    .key-bar input{flex:1;max-width:320px;height:32px;padding:0 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .15s}
    .key-bar input:focus{border-color:var(--accent)}
    .load-btn{height:32px;padding:0 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
    .load-btn:hover{opacity:.85}
    .tab-bar{position:sticky;top:calc(var(--header-h) + var(--key-bar-h));z-index:180;height:var(--tab-bar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 12px;overflow-x:auto;scrollbar-width:none}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab-btn{position:relative;height:40px;padding:0 14px;background:none;border:none;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
    .tab-btn:hover{color:var(--text)}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:9px;margin-left:5px;vertical-align:middle}
    main{max-width:960px;margin:0 auto;padding:20px 16px}
    .tab-pane{display:none}
    .tab-pane.active{display:block}
    .filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
    .filter-bar select,.filter-bar input[type=text],.filter-bar input[type=date]{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
    .filter-bar select:focus,.filter-bar input:focus{border-color:var(--accent)}
    .filter-bar label{font-size:11px;color:var(--muted)}
    .filter-bar .spacer{flex:1}
    .csv-btn{height:32px;padding:0 12px;background:#0f172a;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .15s}
    .csv-btn:hover{opacity:.8}
    .card-list{display:grid;gap:10px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .15s}
    .card:hover{border-color:var(--border-mid)}
    .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
    .card-title{font-size:14px;font-weight:600;color:var(--text)}
    .card-meta{font-size:11px;color:var(--dim);line-height:1.7}
    .card-body{font-size:13px;color:var(--muted);line-height:1.8;white-space:pre-wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.02em}
    .badge-open{background:var(--warning-light);color:#92400e}
    .badge-closed{background:#f1f5f9;color:var(--muted)}
    .badge-active{background:var(--success-light);color:#166534}
    .badge-cancelled{background:var(--danger-light);color:#991b1b}
    .badge-hidden{background:#f1f5f9;color:var(--muted)}
    .btn{display:inline-flex;align-items:center;gap:4px;height:30px;padding:0 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text);transition:background .15s,border-color .15s}
    .btn:hover{background:var(--bg);border-color:var(--border-mid)}
    .btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
    .btn-danger:hover{opacity:.88;background:var(--danger)}
    .btn-warning{background:var(--warning);color:#fff;border-color:var(--warning)}
    .btn-warning:hover{opacity:.88;background:var(--warning)}
    .btn-action{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-action:hover{opacity:.88;background:var(--accent)}
    .btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
    .form-grid{display:grid;gap:12px}
    .form-group{display:grid;gap:4px}
    .form-group label{font-size:12px;font-weight:500;color:var(--muted)}
    .form-group select,.form-group input,.form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);background:var(--bg);outline:none;font-family:inherit;transition:border-color .15s}
    .form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);background:var(--surface)}
    .form-group textarea{min-height:80px;resize:vertical}
    .form-submit{height:40px;padding:0 24px;background:#0f172a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
    .form-submit:hover{opacity:.85}
    .sched-stats{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0}
    .sched-stat{font-size:12px;color:var(--muted)}
    .sched-stat strong{color:var(--text);font-weight:600}
    .state-box{padding:48px 24px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:10px}
    .state-box .icon{font-size:28px;margin-bottom:10px}
    .state-box p{font-size:13px;color:var(--muted)}
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-box{padding:14px 16px;background:var(--danger-light);border:1px solid #fecaca;border-radius:8px;font-size:13px;color:#991b1b;margin-bottom:12px}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:9999;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
    #toast.show{opacity:1}
    #toast.success{background:#0f172a}
    #toast.error{background:var(--danger)}
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:auto}
    .modal{background:var(--surface);border-radius:14px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(12px) scale(.98);transition:transform .22s}
    .modal-overlay.open .modal{transform:none}
    .modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
    .modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
    @media(max-width:600px){main{padding:14px 10px}.card-header{flex-direction:column;gap:6px}.sched-stats{gap:10px}}
  </style>
</head>
<body>
<header>
  <h1>1 day X 管理画面</h1>
  <div class="status-dot" id="status-dot" title="API接続確認中"></div>
</header>
<div class="key-bar">
  <label>管理キー</label>
  <input id="admin-key" type="password" placeholder="●●●●●●●●" autocomplete="current-password">
  <button class="load-btn" onclick="loadCurrentTab()">読み込み</button>
</div>
<div class="tab-bar">
  <button class="tab-btn active" data-tab="inquiries" onclick="switchTab('inquiries')">問い合わせ<span class="tab-badge" id="badge-inquiries" style="display:none"></span></button>
  <button class="tab-btn" data-tab="schedules" onclick="switchTab('schedules')">日程一覧</button>
  <button class="tab-btn" data-tab="add-schedule" onclick="switchTab('add-schedule')">日程追加</button>
  <button class="tab-btn" data-tab="reservations" onclick="switchTab('reservations')">予約一覧</button>
  <button class="tab-btn" data-tab="waitlists" onclick="switchTab('waitlists')">キャンセル待ち</button>
  <button class="tab-btn" data-tab="users" onclick="switchTab('users')">ユーザー一覧</button>
</div>
<main>
  <!-- ① 問い合わせ -->
  <div class="tab-pane active" id="pane-inquiries">
    <div class="filter-bar">
      <label>ステータス</label>
      <select id="f-inq-status" onchange="renderInquiries()">
        <option value="">すべて</option>
        <option value="open" selected>未対応</option>
        <option value="closed">対応済み</option>
      </select>
    </div>
    <div id="list-inquiries" class="card-list"><div class="state-box"><p>管理キーを入力して読み込んでください</p></div></div>
  </div>
  <!-- ② 日程一覧 -->
  <div class="tab-pane" id="pane-schedules">
    <div class="filter-bar">
      <label>イベント</label>
      <select id="f-sched-event" onchange="renderSchedules()">
        <option value="">すべて</option>
        <option value="EVT-A">1 day bar</option>
        <option value="EVT-B">1 day desk</option>
        <option value="EVT-C">1 day topic</option>
      </select>
      <label>表示</label>
      <select id="f-sched-hidden" onchange="renderSchedules()">
        <option value="visible">公開中のみ</option>
        <option value="">すべて</option>
        <option value="hidden">非公開のみ</option>
      </select>
    </div>
    <div id="list-schedules" class="card-list"><div class="state-box"><p>管理キーを入力して読み込んでください</p></div></div>
  </div>
  <!-- ③ 日程追加 -->
  <div class="tab-pane" id="pane-add-schedule">
    <div class="form-card">
      <div class="form-grid">
        <div class="form-group"><label>イベント *</label>
          <select id="sched-event-id">
            <option value="EVT-A">1 day bar</option>
            <option value="EVT-B">1 day desk</option>
            <option value="EVT-C">1 day topic</option>
          </select>
        </div>
        <div class="form-group"><label>開催日時 *</label><input id="sched-starts-at" type="datetime-local"></div>
        <div class="form-group"><label>受付開始日時</label><input id="sched-accept-start-at" type="datetime-local"></div>
        <div class="form-group"><label>受付終了日時</label><input id="sched-accept-end-at" type="datetime-local"></div>
        <div class="form-group"><label>定員上書き（空欄でイベント既定値）</label><input id="sched-capacity" type="number" placeholder="例: 10"></div>
        <div class="form-group"><label>場所</label><input id="sched-location" placeholder="例: 港区リーブラ"></div>
        <div class="form-group"><label>備考</label><textarea id="sched-note" placeholder="参加者への補足など"></textarea></div>
        <div><button class="form-submit" onclick="createSchedule()">日程を追加する</button></div>
      </div>
    </div>
  </div>
  <!-- ④ 予約一覧 -->
  <div class="tab-pane" id="pane-reservations">
    <div class="filter-bar">
      <label>イベント</label>
      <select id="f-rsv-event" onchange="renderReservations()">
        <option value="">すべて</option>
        <option value="EVT-A">1 day bar</option>
        <option value="EVT-B">1 day desk</option>
        <option value="EVT-C">1 day topic</option>
      </select>
      <label>ステータス</label>
      <select id="f-rsv-status" onchange="renderReservations()">
        <option value="active" selected>有効のみ</option>
        <option value="">すべて</option>
        <option value="cancelled">キャンセル済み</option>
      </select>
      <label>開催日</label>
      <input type="date" id="f-rsv-date" onchange="renderReservations()">
      <div class="spacer"></div>
      <button class="csv-btn" onclick="exportCsv()">CSV ↓</button>
    </div>
    <div id="list-reservations" class="card-list"><div class="state-box"><p>管理キーを入力して読み込んでください</p></div></div>
  </div>
  <!-- ⑤ キャンセル待ち -->
  <div class="tab-pane" id="pane-waitlists">
    <div class="filter-bar">
      <label>イベント</label>
      <select id="f-wl-event" onchange="renderWaitlists()">
        <option value="">すべて</option>
        <option value="EVT-A">1 day bar</option>
        <option value="EVT-B">1 day desk</option>
        <option value="EVT-C">1 day topic</option>
      </select>
      <label>ステータス</label>
      <select id="f-wl-status" onchange="renderWaitlists()">
        <option value="active" selected>待機中</option>
        <option value="">すべて</option>
      </select>
    </div>
    <div id="list-waitlists" class="card-list"><div class="state-box"><p>管理キーを入力して読み込んでください</p></div></div>
  </div>
  <!-- ⑥ ユーザー一覧 -->
  <div class="tab-pane" id="pane-users">
    <div class="filter-bar">
      <label>名前検索</label>
      <input type="text" id="f-user-name" placeholder="名前で絞り込み" oninput="renderUsers()">
    </div>
    <div id="list-users" class="card-list"><div class="state-box"><p>管理キーを入力して読み込んでください</p></div></div>
  </div>
</main>

<!-- 編集モーダル -->
<div class="modal-overlay" id="modal-edit" onclick="closeEditModal(event)">
  <div class="modal">
    <h3>日程を編集</h3>
    <input type="hidden" id="edit-sched-id">
    <div class="form-grid">
      <div class="form-group"><label>開催日時</label><input id="edit-starts-at" type="datetime-local"></div>
      <div class="form-group"><label>受付開始</label><input id="edit-accept-start" type="datetime-local"></div>
      <div class="form-group"><label>受付終了</label><input id="edit-accept-end" type="datetime-local"></div>
      <div class="form-group"><label>定員上書き</label><input id="edit-capacity" type="number" placeholder="空欄でイベント既定値"></div>
      <div class="form-group"><label>場所</label><input id="edit-location"></div>
      <div class="form-group"><label>備考</label><textarea id="edit-note"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeEditModal()">キャンセル</button>
      <button class="btn btn-action" onclick="saveScheduleEdit()">保存する</button>
    </div>
  </div>
</div>

<!-- 非公開モーダル -->
<div class="modal-overlay" id="modal-hide" onclick="closeHideModal(event)">
  <div class="modal">
    <h3>日程を非公開にする</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.8;">この日程を非公開にします。一般ユーザーから見えなくなります。</p>
    <input type="hidden" id="hide-sched-id">
    <label style="display:flex;align-items:flex-start;gap:8px;font-size:13px;cursor:pointer;padding:10px;border:1px solid var(--border);border-radius:8px;">
      <input type="checkbox" id="hide-notify" style="width:16px;height:16px;margin-top:2px;flex-shrink:0;">
      <span>予約済みの参加者にLINE通知を送る<br><span style="font-size:11px;color:var(--muted);">「〇〇は中止となりました」メッセージが送信されます</span></span>
    </label>
    <div class="modal-foot">
      <button class="btn" onclick="closeHideModal()">戻る</button>
      <button class="btn btn-warning" onclick="executeHide()">非公開にする</button>
    </div>
  </div>
</div>

<!-- キャンセルモーダル -->
<div class="modal-overlay" id="modal-cancel" onclick="closeCancelModal(event)">
  <div class="modal">
    <h3>予約をキャンセルする</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:8px;" id="cancel-modal-desc"></p>
    <p style="font-size:12px;color:var(--danger);">この操作は取り消せません。</p>
    <input type="hidden" id="cancel-rsv-id">
    <div class="modal-foot">
      <button class="btn" onclick="closeCancelModal()">戻る</button>
      <button class="btn btn-danger" onclick="executeCancel()">キャンセルを実行</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API='https://reservation.1dayx.jp';
const KEY_STORAGE='admin_key_1dayx';

function getKey(){
  const v=document.getElementById('admin-key').value.trim();
  if(v){sessionStorage.setItem(KEY_STORAGE,v);return v;}
  return sessionStorage.getItem(KEY_STORAGE)||'';
}

window.addEventListener('DOMContentLoaded',()=>{
  const s=sessionStorage.getItem(KEY_STORAGE);
  if(s)document.getElementById('admin-key').value=s;
  checkApiHealth();
});

async function checkApiHealth(){
  try{
    const r=await fetch(API+'/api/health');
    const dot=document.getElementById('status-dot');
    if(r.ok){dot.style.background='var(--success)';dot.title='API 接続OK';}
    else{dot.style.background='var(--danger)';dot.title='API エラー';}
  }catch{document.getElementById('status-dot').style.background='var(--danger)';}
}

async function apiFetch(path,options={}){
  const key=getKey();
  const res=await fetch(API+path,{
    ...options,
    headers:{
      'x-admin-api-key':key,
      ...(options.body?{'Content-Type':'application/json'}:{}),
      ...(options.headers||{}),
    },
  });
  const data=await res.json();
  if(!res.ok)throw new Error(data.message||'HTTP '+res.status);
  return data;
}

function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let toastTimer;
function showToast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+type;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.className='',2800);
}

function setLoading(id){document.getElementById(id).innerHTML='<div class="state-box"><div class="spinner"></div><p>読み込み中...</p></div>';}
function setError(id,msg){document.getElementById(id).innerHTML=`<div class="error-box">&#9888; ${esc(msg)}</div>`;}
function setEmpty(id,msg='データがありません'){document.getElementById(id).innerHTML=`<div class="state-box"><div class="icon">&#128235;</div><p>${esc(msg)}</p></div>`;}

let currentTab='inquiries';
const loaded={};

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+tab));
  currentTab=tab;
  if(!loaded[tab])loadTab(tab);
}

function loadCurrentTab(){loadTab(currentTab);}

async function loadTab(tab){
  loaded[tab]=true;
  if(tab==='inquiries')await fetchInquiries();
  if(tab==='schedules')await fetchSchedules();
  if(tab==='reservations')await fetchReservations();
  if(tab==='waitlists')await fetchWaitlists();
  if(tab==='users')await fetchUsers();
}

/* ── 問い合わせ ───────────────────────────────────────── */
let inquiriesData=[];
async function fetchInquiries(){
  setLoading('list-inquiries');
  try{
    const data=await apiFetch('/api/admin/inquiries');
    inquiriesData=data.inquiries||[];
    updateInquiryBadge();renderInquiries();
  }catch(e){setError('list-inquiries',e.message);}
}
function updateInquiryBadge(){
  const open=inquiriesData.filter(i=>i.status==='open').length;
  const b=document.getElementById('badge-inquiries');
  if(open>0){b.textContent=open;b.style.display='';}else{b.style.display='none';}
}
function renderInquiries(){
  const s=document.getElementById('f-inq-status').value;
  const list=inquiriesData.filter(i=>!s||i.status===s);
  if(!list.length){setEmpty('list-inquiries','該当する問い合わせがありません');return;}
  document.getElementById('list-inquiries').innerHTML=list.map(inq=>`
    <div class="card">
      <div class="card-header">
        <div><span class="card-title">${esc(inq.name||'（名前なし）')}</span>
        <span class="badge badge-${esc(inq.status)}" style="margin-left:8px;">${inq.status==='open'?'未対応':'対応済み'}</span></div>
        <div class="card-meta">#${esc(inq.id)} &middot; ${fmtDate(inq.receivedAt||inq.createdAt)}</div>
      </div>
      <div class="card-meta">${esc(inq.lineUserId||'（LINE ID不明）')}</div>
      <div class="card-body" style="margin-top:8px;">${esc(inq.message)}</div>
      ${inq.status==='open'?`<div class="btn-row"><button class="btn btn-action" onclick="closeInquiry(${Number(inq.id)})">&#10003; 対応済みにする</button></div>`:''}
    </div>`).join('');
}
async function closeInquiry(id){
  try{await apiFetch('/api/admin/inquiries/'+id+'/close',{method:'POST'});showToast('対応済みにしました');await fetchInquiries();}
  catch(e){showToast(e.message,'error');}
}

/* ── 日程一覧 ─────────────────────────────────────────── */
let schedulesData=[];
async function fetchSchedules(){
  setLoading('list-schedules');
  try{
    const data=await apiFetch('/api/admin/schedules');
    schedulesData=data.schedules||[];renderSchedules();
  }catch(e){setError('list-schedules',e.message);}
}
function renderSchedules(){
  const evtF=document.getElementById('f-sched-event').value;
  const hidF=document.getElementById('f-sched-hidden').value;
  const list=schedulesData.filter(s=>{
    if(evtF&&s.eventId!==evtF)return false;
    const hidden=s.isHidden||(s.note&&s.note.startsWith('[非公開]'));
    if(hidF==='visible'&&hidden)return false;
    if(hidF==='hidden'&&!hidden)return false;
    return true;
  });
  if(!list.length){setEmpty('list-schedules','該当する日程がありません');return;}
  document.getElementById('list-schedules').innerHTML=list.map(s=>{
    const hidden=s.isHidden||(s.note&&s.note.startsWith('[非公開]'));
    const note=hidden?(s.note||'').replace('[非公開]','').trim():s.note;
    return `<div class="card" style="${hidden?'opacity:.55;':''}">
      <div class="card-header">
        <div><span class="card-title">${esc(s.eventName)}</span>${hidden?'<span class="badge badge-hidden" style="margin-left:8px;">非公開</span>':''}</div>
        <div class="card-meta">${esc(s.id)}</div>
      </div>
      <div style="font-size:14px;font-weight:500;margin-bottom:6px;">&#128197; ${esc(s.datetime)}</div>
      ${s.location?`<div class="card-meta">&#128205; ${esc(s.location)}</div>`:''}
      <div class="sched-stats">
        <div class="sched-stat">予約 <strong>${esc(s.reservedCount)}</strong> / 定員 <strong>${esc(s.capacity)}</strong></div>
        <div class="sched-stat">残席 <strong>${esc(s.remainingCount)}</strong></div>
        <div class="sched-stat">待機 <strong>${esc(s.waitlistCount)}</strong></div>
      </div>
      ${note?`<div class="card-meta" style="margin-top:4px;">&#128172; ${esc(note)}</div>`:''}
      ${!hidden?`<div class="btn-row">
        <button class="btn" onclick='openEditModal(${JSON.stringify(s)})'>&#9998; 編集</button>
        <button class="btn btn-warning" onclick="openHideModal('${esc(s.id)}')">&#128274; 非公開にする</button>
      </div>`:''}
    </div>`;
  }).join('');
}

/* ── 日程追加 ─────────────────────────────────────────── */
function toIso(v){return v?new Date(v).toISOString():null;}
async function createSchedule(){
  const payload={
    eventId:document.getElementById('sched-event-id').value,
    startsAt:toIso(document.getElementById('sched-starts-at').value),
    acceptStartAt:toIso(document.getElementById('sched-accept-start-at').value),
    acceptEndAt:toIso(document.getElementById('sched-accept-end-at').value),
    capacityOverride:document.getElementById('sched-capacity').value||null,
    location:document.getElementById('sched-location').value.trim(),
    note:document.getElementById('sched-note').value.trim(),
  };
  if(!payload.startsAt){showToast('開催日時は必須です','error');return;}
  try{
    await apiFetch('/api/admin/schedules',{method:'POST',body:JSON.stringify(payload)});
    showToast('日程を追加しました');
    ['sched-starts-at','sched-accept-start-at','sched-accept-end-at','sched-capacity','sched-location','sched-note']
      .forEach(id=>document.getElementById(id).value='');
    loaded['schedules']=false;switchTab('schedules');
  }catch(e){showToast(e.message,'error');}
}

/* ── 予約一覧 ─────────────────────────────────────────── */
let reservationsData=[];
async function fetchReservations(){
  setLoading('list-reservations');
  try{
    const data=await apiFetch('/api/admin/reservations');
    reservationsData=data.reservations||[];renderReservations();
  }catch(e){setError('list-reservations',e.message);}
}
function renderReservations(){
  const evtF=document.getElementById('f-rsv-event').value;
  const stsF=document.getElementById('f-rsv-status').value;
  const dateF=document.getElementById('f-rsv-date').value;
  const list=reservationsData.filter(r=>{
    if(evtF&&r.eventId!==evtF)return false;
    if(stsF&&r.status!==stsF)return false;
    if(dateF&&r.startsAt){if(new Date(r.startsAt).toISOString().slice(0,10)!==dateF)return false;}
    return true;
  });
  if(!list.length){setEmpty('list-reservations','該当する予約がありません');return;}
  document.getElementById('list-reservations').innerHTML=list.map(r=>`
    <div class="card">
      <div class="card-header">
        <div><span class="card-title">${esc(r.name||'（名前なし）')}</span>
        <span class="badge badge-${esc(r.status)}" style="margin-left:8px;">${statusLabel(r.status)}</span></div>
        <div class="card-meta">${esc(r.reservationId)}</div>
      </div>
      <div style="font-size:13px;margin-bottom:4px;"><strong>${esc(r.eventName)}</strong> &middot; ${esc(r.datetime)}</div>
      ${r.location?`<div class="card-meta">&#128205; ${esc(r.location)}</div>`:''}
      <div class="card-meta">LINE: ${esc(r.lineUserId)}</div>
      <div class="card-meta">予約日時: ${fmtDate(r.reservedAt)}</div>
      ${r.status==='active'?`<div class="btn-row">
        <button class="btn btn-danger" onclick="openCancelModal('${esc(r.reservationId)}','${esc(r.name)}','${esc(r.eventName)}')">&#10005; キャンセルする</button>
      </div>`:''}
    </div>`).join('');
}
function exportCsv(){
  const evtF=document.getElementById('f-rsv-event').value;
  const stsF=document.getElementById('f-rsv-status').value;
  const dateF=document.getElementById('f-rsv-date').value;
  const list=reservationsData.filter(r=>{
    if(evtF&&r.eventId!==evtF)return false;
    if(stsF&&r.status!==stsF)return false;
    if(dateF&&r.startsAt){if(new Date(r.startsAt).toISOString().slice(0,10)!==dateF)return false;}
    return true;
  });
  if(!list.length){showToast('エクスポートするデータがありません','error');return;}
  const header=['予約ID','ステータス','名前','イベント','開催日時','場所','LINE ID','予約日時','キャンセル日時'];
  const rows=list.map(r=>[r.reservationId,r.status,r.name,r.eventName,r.datetime,r.location,r.lineUserId,fmtDate(r.reservedAt),fmtDate(r.cancelledAt)]);
  const csv=[header,...rows].map(row=>row.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='reservations_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);showToast('CSVをダウンロードしました');
}

/* ── 編集モーダル ─────────────────────────────────────── */
function toLocalInput(iso){
  if(!iso)return'';
  const d=new Date(iso);
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());
}
function openEditModal(s){
  document.getElementById('edit-sched-id').value=s.id;
  document.getElementById('edit-starts-at').value=toLocalInput(s.startsAt);
  document.getElementById('edit-accept-start').value=toLocalInput(s.acceptStartAt);
  document.getElementById('edit-accept-end').value=toLocalInput(s.acceptEndAt);
  document.getElementById('edit-capacity').value=s.capacityOverride!=null?s.capacityOverride:'';
  document.getElementById('edit-location').value=s.location||'';
  document.getElementById('edit-note').value=s.note||'';
  document.getElementById('modal-edit').classList.add('open');
}
function closeEditModal(e){if(!e||e.target===document.getElementById('modal-edit'))document.getElementById('modal-edit').classList.remove('open');}
async function saveScheduleEdit(){
  const id=document.getElementById('edit-sched-id').value;
  const payload={
    startsAt:toIso(document.getElementById('edit-starts-at').value),
    acceptStartAt:toIso(document.getElementById('edit-accept-start').value),
    acceptEndAt:toIso(document.getElementById('edit-accept-end').value),
    capacityOverride:document.getElementById('edit-capacity').value||null,
    location:document.getElementById('edit-location').value.trim(),
    note:document.getElementById('edit-note').value.trim(),
  };
  try{
    await apiFetch('/api/admin/schedules/'+id,{method:'PATCH',body:JSON.stringify(payload)});
    showToast('日程を更新しました');document.getElementById('modal-edit').classList.remove('open');
    loaded['schedules']=false;await fetchSchedules();
  }catch(e){showToast(e.message,'error');}
}

/* ── 非公開モーダル ───────────────────────────────────── */
function openHideModal(id){
  document.getElementById('hide-sched-id').value=id;
  document.getElementById('hide-notify').checked=false;
  document.getElementById('modal-hide').classList.add('open');
}
function closeHideModal(e){if(!e||e.target===document.getElementById('modal-hide'))document.getElementById('modal-hide').classList.remove('open');}
async function executeHide(){
  const id=document.getElementById('hide-sched-id').value;
  const notify=document.getElementById('hide-notify').checked;
  try{
    const data=await apiFetch('/api/admin/schedules/'+id+'/hide',{method:'POST',body:JSON.stringify({notifyReservees:notify})});
    showToast(notify?'非公開にしました（'+data.notifiedCount+'件 LINE通知済み）':'非公開にしました');
    document.getElementById('modal-hide').classList.remove('open');loaded['schedules']=false;await fetchSchedules();
  }catch(e){showToast(e.message,'error');}
}

/* ── キャンセルモーダル ───────────────────────────────── */
function openCancelModal(id,name,event){
  document.getElementById('cancel-rsv-id').value=id;
  document.getElementById('cancel-modal-desc').textContent='「'+name+'」さんの「'+event+'」予約をキャンセルします。';
  document.getElementById('modal-cancel').classList.add('open');
}
function closeCancelModal(e){if(!e||e.target===document.getElementById('modal-cancel'))document.getElementById('modal-cancel').classList.remove('open');}
async function executeCancel(){
  const id=document.getElementById('cancel-rsv-id').value;
  try{
    await apiFetch('/api/admin/reservations/'+id+'/cancel',{method:'POST'});
    showToast('予約をキャンセルしました');document.getElementById('modal-cancel').classList.remove('open');
    loaded['reservations']=false;await fetchReservations();
  }catch(e){showToast(e.message,'error');}
}

/* ── ユーティリティ ───────────────────────────────────── */
function fmtDate(v){
  if(!v)return'—';
  return new Intl.DateTimeFormat('ja-JP',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date(v));
}
function statusLabel(s){return{active:'有効',cancelled:'キャンセル済',modified:'変更済'}[s]||s;}
</script>
