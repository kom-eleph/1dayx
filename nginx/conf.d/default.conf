server {
    listen 80;
    server_name 1dayx.jp www.1dayx.jp;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 1dayx.jp www.1dayx.jp;

    ssl_certificate /etc/letsencrypt/live/1dayx.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1dayx.jp/privkey.pem;

    location = /admin.html {
        auth_basic "Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://site:3000/admin.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://site:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
